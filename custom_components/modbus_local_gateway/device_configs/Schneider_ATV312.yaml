      3: "AI3 Analog input AI3"
      16: "AIV1 Analog input AIV1"
      160: "UPdt (1) + speed/- speed via LI"
      161: "UpdH (1) + speed/- speed using the jog dial"
      163: "LCC Reference via the remote display terminal, LFr parameter in the SEt- or SUP-menu"
      164: "Mdb Reference via Modbus, LFr parameter in the SEt- or SUP-menu"
