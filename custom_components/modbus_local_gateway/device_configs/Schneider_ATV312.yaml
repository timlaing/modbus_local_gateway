      1: "Ready to switch on"
      2: "Switched on"
      3: "Operation enabled"
      4: "Detected fault"
      6: "Quick stop"
      7: "Switch on disabled"
      8: "Alarm present"
      11: "Reference reached"
      12: "Reference exceeded LSP/HSP limits"
      15: "STOP key imposed stop"
      16: "Reverse rotation"

  drive_fault_active:
    name: "Drive Fault Active"
