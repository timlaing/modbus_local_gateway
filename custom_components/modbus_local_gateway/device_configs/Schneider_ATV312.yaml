# Schneider Electric Altivar ATV312
# Source: ATV312 communication variables manual BBV51701 06/2009

device:
  manufacturer: "Schneider Electric"
  model: "Altivar ATV312"
  max_register_read: 8

read_write_word:
  # Safe Home Assistant motor speed control.
  # Requires Fr1 = Mdb on the drive if Modbus is the active reference channel.
  # Pool motor use case:
  # - minimum usable speed: 18 Hz
  # - normal filtration: 30 to 40 Hz
  # - 60 Hz is a temporary boost only
  lfr_frequency_reference_via_bus:
    name: "LFr Frequency Reference via Bus"
    address: 8502
    signed: true
    multiplier: 0.1
    precision: 1
    unit_of_measurement: Hz
    control: number
    number:
      min: 18.0
      max: 60.0
      step: 0.1
      mode: slider

  # Sensitive runtime bus-control register.
  # No Home Assistant switch is exposed in the standard profile because CMD is a full
  # bitfield with active-low semantics and unsafe values are easy to send accidentally.
  # bit 0: Switch on (active at 1)
  # bit 1: Disable voltage (active at 0)
  # bit 2: Quick stop (active at 0)
  # bit 3: Enable operation (active at 1)
  # bit 7: Fault state reset (active on rising edge 0 -> 1)
  # bit 11: Reverse direction command when set
  # bit 12: Stop command when set
  # bit 13: Injection stop command when set
  # bit 14: Fast stop command when set
  cmd_control_word:
    name: "CMD Control Word"
    address: 8501
    entity_category: config
    entity_registry_enabled_default: False

  # Optional PI reference, not used for the standard pool-motor profile.
  pisp_pi_reference_via_bus:
    name: "PISP PI Reference via Bus"
    address: 8503
    multiplier: 0.1
    precision: 1
    unit_of_measurement: "%"
    control: number
    number:
      min: 0.0
      max: 100.0
      step: 0.1
    entity_category: config
    entity_registry_enabled_default: False

  # Core motor speed and ramp settings.
  acc_acceleration_ramp_time:
    name: "ACC Acceleration Ramp Time"
    address: 9001
    multiplier: 0.1
    precision: 1
    unit_of_measurement: Seconds
    control: number
    number:
      min: 0.1
      max: 3276.0
      step: 0.1
    entity_category: config
    entity_registry_enabled_default: False

  dec_deceleration_ramp_time:
    name: "dEC Deceleration Ramp Time"
    address: 9002
    multiplier: 0.1
    precision: 1
    unit_of_measurement: Seconds
    control: number
    number:
      min: 0.1
      max: 3276.0
      step: 0.1
    entity_category: config
    entity_registry_enabled_default: False

  lsp_low_speed:
    name: "LSP Low Speed"
    address: 3105
    multiplier: 0.1
    precision: 1
    unit_of_measurement: Hz
    control: number
    number:
      min: 18.0
      max: 60.0
      step: 0.1
    entity_category: config
    entity_registry_enabled_default: False

  hsp_high_speed:
    name: "HSP High Speed"
    address: 3104
    multiplier: 0.1
    precision: 1
    unit_of_measurement: Hz
    control: number
    number:
      min: 18.0
      max: 60.0
      step: 0.1
    entity_category: config
    entity_registry_enabled_default: False

  # R/WS: writable only when drive is stopped.
  tfr_maximum_output_frequency:
    name: "tFr Maximum Output Frequency"
    address: 3103
    multiplier: 0.1
    precision: 1
    unit_of_measurement: Hz
    control: number
    number:
      min: 18.0
      max: 60.0
      step: 0.1
    entity_category: config
    entity_registry_enabled_default: False

  # Current limits depend on the installed drive rating, so they are exposed without a
  # number write control in the standard profile.
  ith_motor_thermal_protection_current:
    name: "ItH Motor Thermal Protection Current"
    address: 9622
    multiplier: 0.1
    precision: 1
    unit_of_measurement: Amps
    entity_category: config
    entity_registry_enabled_default: False

  cli_current_limit:
    name: "CLI Current Limit"
    address: 9201
    multiplier: 0.1
    precision: 1
    unit_of_measurement: Amps
    entity_category: config
    entity_registry_enabled_default: False

  # Frequency thresholds and relay-related settings useful for the UV-lamp use case.
  # Recommended UV strategy: assign the used relay to FtA and set Ftd to the desired
  # cruise frequency, typically between 30 and 40 Hz.
  # R/WS: writable only when drive is stopped.
  ftd_motor_frequency_threshold:
    name: "Ftd Motor Frequency Threshold"
    address: 11003
    multiplier: 0.1
    precision: 1
    unit_of_measurement: Hz
    control: number
    number:
      min: 0.0
      max: 60.0
      step: 0.1
    entity_category: config
    entity_registry_enabled_default: False

  # R/WS: writable only when drive is stopped.
  relay_r1_assignment:
    name: "Relay R1 Assignment"
    address: 5001
    control: select
    options:
      0: "nO Not assigned"
      1: "FLt Drive detected fault"
      2: "rUn Drive running"
      4: "FtA Frequency threshold reached"
      5: "FLA High speed (HSP) reached"
      6: "CtA Current threshold reached"
      7: "SrA Frequency reference reached"
      8: "tSA Motor thermal threshold reached"
      12: "APL Loss of 4-20 mA signal, even if LFL = nO"
      129: "LI1 Returns the value of LI1"
      130: "LI2 Returns the value of LI2"
      131: "LI3 Returns the value of LI3"
      132: "LI4 Returns the value of LI4"
      133: "LI5 Returns the value of LI5"
      134: "LI6 Returns the value of LI6"
    entity_category: config
    entity_registry_enabled_default: False

  # R/WS: writable only when drive is stopped.
  relay_r2_assignment:
    name: "Relay R2 Assignment"
    address: 5002
    control: select
    options:
      0: "nO Not assigned"
      1: "FLt Drive detected fault"
      2: "rUn Drive running"
      4: "FtA Frequency threshold reached"
      5: "FLA High speed (HSP) reached"
      6: "CtA Current threshold reached"
      7: "SrA Frequency reference reached"
      8: "tSA Motor thermal threshold reached"
      9: "bLC Brake sequence (for information, as this assignment can be only be activated or deactivated via the bLC"
      12: "APL Loss of 4-20 mA signal, even if LFL = nO"
      129: "LI1 Returns the value of LI1"
      130: "LI2 Returns the value of LI2"
      131: "LI3 Returns the value of LI3"
      132: "LI4 Returns the value of LI4"
      133: "LI5 Returns the value of LI5"
      134: "LI6 Returns the value of LI6"
    entity_category: config
    entity_registry_enabled_default: False

  # Additional motor-behavior tuning.
