    entity_registry_enabled_default: False

  jf2_second_skip_frequency:
    name: "JF2 Second Skip Frequency"
    address: 11302
    multiplier: 0.1
    precision: 1
    unit_of_measurement: Hz
    control: number
    number:
      min: 0.0
